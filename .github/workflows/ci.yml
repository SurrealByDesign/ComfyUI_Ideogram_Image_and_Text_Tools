name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt is intentionally empty (ComfyUI provides torch/
          # numpy/Pillow at runtime) -- CI runs outside ComfyUI, so install
          # them directly here for the test suite.
          pip install torch numpy pillow
          pip install pytest ruff black
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Test
        run: pytest
